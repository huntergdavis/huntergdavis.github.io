---
layout: default
---
<div id="home" class="grid post">
	<div class="unit whole">
			{% unless page.hide_title %}<h1 class="page-title">{{ page.title }}</h1>{% endunless %}
		{% assign hero = page.image | default: page.featured_img %}
		{% if hero %}
		<img class="post-hero" src="{{ hero }}" alt="" decoding="async">
		{% endif %}
		{{ content | replace: '<img ', '<img loading="lazy" decoding="async" ' }}
	</div>
</div>
