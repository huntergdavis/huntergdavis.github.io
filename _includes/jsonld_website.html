<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.name | jsonify }},
  "description": {{ site.description | jsonify }},
  "url": {{ '/' | absolute_url | jsonify }},
  "inLanguage": "en",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      {% capture search_url %}{{ '/search.html?query=' | absolute_url }}{% raw %}{search_term_string}{% endraw %}{% endcapture %}
      "urlTemplate": {{ search_url | jsonify }}
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
