<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "datePublished": {{ page.date | date_to_xmlschema | jsonify }},
  "url": {{ page.url | absolute_url | jsonify }},
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ page.url | absolute_url | jsonify }}
  },
  "author": {
    "@type": "Person",
    "name": "Hunter Davis",
    "url": {{ '/' | absolute_url | jsonify }}
  }{% if page.image != blank %},
  "image": {{ page.image | absolute_url | jsonify }}{% endif %}{% if page.tags and page.tags.size > 0 %},
  "keywords": {{ page.tags | join: ", " | jsonify }}{% endif %}
}
</script>
