<header class="site-header">
  <h1 class="site-title"><a href="/">{{ site.name }}</a></h1>
  <nav class="main-nav" aria-label="Main">
    <details class="nav-toggle">
      <summary>Menu</summary>
      <ul>
        <li><a href="/"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a></li>
        <li><a href="/projects/"{% if page.url == '/projects/' %} aria-current="page"{% endif %}>Projects</a></li>
        <li><a href="/archive/"{% if page.url == '/archive/' %} aria-current="page"{% endif %}>Archive</a></li>
        <li><a href="/about.html"{% if page.url == '/about.html' %} aria-current="page"{% endif %}>My Story</a></li>
        <li><a href="/public-speaking.html"{% if page.url == '/public-speaking.html' %} aria-current="page"{% endif %}>Leadership and Public Speaking</a></li>
      </ul>
    </details>
  </nav>
  <form class="header-search" action="/search.html" method="get" role="search">
    <label for="header-search-input" class="visually-hidden">Search</label>
    <input type="search" name="query" id="header-search-input" placeholder="Search… (press /)" aria-label="Search posts" autocomplete="off" enterkeyhint="search">
  </form>
  <script>
    (function(){
      document.addEventListener('keydown', function(e){
        if (e.key !== '/' || e.ctrlKey || e.metaKey || e.altKey) return;
        var t = e.target;
        var tag = t && t.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || (t && t.isContentEditable)) return;
        var input = document.getElementById('header-search-input');
        if (input) { e.preventDefault(); input.focus(); input.select(); }
      });
    })();
  </script>


{% if page.quickgrapher == true %}
  <script type="text/javascript" src="https://hunterdavis.com/quickgrapher/js/jquery-1.4.4.min.js"></script>
  <script type="text/javascript" src="https://hunterdavis.com/quickgrapher/js/jquery-ui-1.8.9.custom.min.js"></script>
  <script type="text/javascript" src="https://hunterdavis.com/quickgrapher/js/modernizr-1.6.min.js"></script>
  <script src="https://hunterdavis.com/quickgrapher/js/obfs_embed.js" type="text/javascript" charset="utf-8"></script>
 {% endif %}

 {% if page.cardsimulator == true %}
  <script type="text/javascript" src="https://hunterdavis.com/deck-of-cards/simulators/deck.js"></script>
  <script type="text/javascript" src="https://hunterdavis.com/deck-of-cards/simulators/simulatordiv.js"></script>
 {% endif %}
</header>
