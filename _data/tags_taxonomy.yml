# Tag taxonomy — groupings of related tag slugs that are
# effectively aliases or members of the same family.
#
# Schema:
#   <family-slug>:
#     canonical: <preferred slug>     # what to show in UI
#     members:   [<slug>, <slug>, …]  # tags that fold into this family
#     parent:    <family-slug>        # optional, for nested topics
#
# This file is a draft. Consumers (sidebar widget, tag-page header,
# search-result grouping) can read it via site.data.tags_taxonomy
# and decide how to surface aliases — e.g. /tags/android/ could show
# all members of the `android` family combined, with each member
# listed as "also tagged: …".
#
# Family identification rule of thumb: sibling tags that almost
# always appear together AND describe the same concept get grouped.
# Tags that describe different facets stay separate (e.g.
# `programming` and `linux` are both real top-level concepts and
# should NOT collapse into one).

