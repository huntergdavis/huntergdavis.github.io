# Reserved top-level subpath names — the names of every public,
# non-archived repository under github.com/huntergdavis/ as of the
# regeneration date below.
#
# Why this file exists:
#   This Jekyll site is published to hunterdavis.com via the
#   user-page repo huntergdavis/huntergdavis.github.io. Any other
#   repo under huntergdavis/ that has GitHub Pages enabled is
#   automatically served at hunterdavis.com/<repo-name>/. If the
#   Jekyll site here ever emitted a top-level path that matched one
#   of those repo names, the project deploy and the user-page deploy
#   would collide unpredictably.
#
#   This file is the single source of truth for "names this Jekyll
#   site cannot use as top-level paths." A future build-time check
#   (Phase A backlog) will read this list and fail the build if any
#   conflicting top-level path appears in the source tree.
#
# How to regenerate:
#   gh repo list huntergdavis --limit 300 \
#     --json name,visibility,isArchived \
#     --jq '[.[] | select(.visibility=="PUBLIC" and .isArchived==false and .name != "huntergdavis.github.io") | .name] | sort_by(. | ascii_downcase) | .[]'
#
# Case sensitivity:
#   GitHub preserves repo-name case. When the build-fail check is
#   written, do collision detection case-insensitively to match how
#   most filesystems and browsers interpret URLs.
#
# Last regenerated: 2026-05-10
# Repository count: 135
#
# Note: the existing sidebar includes /resume/ and /photo-stream/ as
# links, but no exact-match repos exist under huntergdavis/ today —
# the actual deploys are likely Hunter-Davis-impressjs-Resume and
# photo-stream-static. Those two sidebar links may already 404; track
# as a separate cleanup item in the planning doc.
