---
layout: none
sitemap:
  exclude: true
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Random post · {{ site.name }}</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=/archive/">
</head>
<body>
<script>
(function(){
  var posts = [{% for post in site.posts %}{{ post.url | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}];
  if (posts.length){
    location.replace(posts[Math.floor(Math.random() * posts.length)]);
  }
})();
</script>
</body>
</html>
